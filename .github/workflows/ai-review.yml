name: AI PR Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  checks: write
  contents: read

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: Run AI review
        working-directory: .github/scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIFF_PATH: /tmp/pr.diff
          GATE_THRESHOLD: "70"
        run: node --loader ts-node/esm review.ts 2>&1

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('/tmp/pr_comment.md')) process.exit(0);
            const body = fs.readFileSync('/tmp/pr_comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Enforce gate
        run: |
          SCORE=$(cat /tmp/gate_score.txt 2>/dev/null || echo "0")
          PASSED=$(cat /tmp/gate_passed.txt 2>/dev/null || echo "false")
          echo "Composite score: $SCORE / 100"
          if [ "$PASSED" = "false" ]; then
            echo "AI review gate FAILED (score=$SCORE, threshold=70)"
            exit 1
          fi
          echo "AI review gate PASSED (score=$SCORE)"
