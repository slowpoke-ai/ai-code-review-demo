name: AI PR Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.js"

permissions:
  pull-requests: write   # post PR comments
  checks: write          # create check runs
  contents: read

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install review deps
        working-directory: .github/scripts
        run: npm ci

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.ts' '*.tsx' '*.js' \
            > /tmp/pr.diff
          echo "lines=$(wc -l < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Run AI review
        id: review
        working-directory: .github/scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIFF_PATH: /tmp/pr.diff
          GATE_THRESHOLD: "70"
        run: |
          node review.js 2>&1 | tee /tmp/review_output.json
          echo "result=$(cat /tmp/review_output.json | tail -1)" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/pr_comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Enforce gate
        run: |
          SCORE=$(cat /tmp/gate_score.txt)
          PASSED=$(cat /tmp/gate_passed.txt)
          echo "Composite score: $SCORE / 100"
          if [ "$PASSED" = "false" ]; then
            echo "❌ AI review gate FAILED (score=$SCORE < threshold=70)"
            exit 1
          fi
          echo "✅ AI review gate PASSED (score=$SCORE)"