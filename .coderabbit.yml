# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# 文档：https://docs.coderabbit.ai/configure-coderabbit

language: "zh-CN"

# ── 审查触发配置 ────────────────────────────────────────────
reviews:
  auto_review:
    enabled: true
    drafts: false

  ignore_title_keywords:
    - "[skip ci]"
    - "[no review]"
    - "chore:"
    - "docs:"
    - "WIP"

  path_filters:
    - "!**/*.md"
    - "!**/*.json"
    - "!**/*.lock"
    - "!.github/**"
    - "!docs/**"

  # ✅ 修复 bug：原来是字符串 "comment"，应为布尔值
  # true  = 审查通过时自动 approve（配合 Branch Protection 作为卡点）
  # false = 只评论，不 approve
  review_status: true

  poem: false
  collapse_walkthrough: false

  # ── 自定义审查规则（注入到 AI system prompt）────────────────
  custom_reviews:
    - name: "安全检查"
      description: |
        重点检查以下安全问题，发现任何一项必须 request changes，不得 approve：
        - SQL 注入：禁止字符串拼接查询，必须使用参数化查询
        - 硬编码密钥：任何 password/secret/token/key 不得硬编码，应使用 process.env
        - 弱加密：密码哈希禁止使用 MD5/SHA1，必须使用 bcrypt/argon2
        - eval() 或 Function() 执行用户输入（RCE 风险）
        - 路径遍历：文件操作必须用 path.basename 或白名单校验路径
        - 缺少鉴权的 API 接口
        - 敏感字段（CVV/card_number/password）出现在日志或 API 响应中
      severity: error

    - name: "代码质量"
      description: |
        检查以下质量问题：
        - 禁止使用 console.log（请使用结构化 logger）
        - 禁止使用 TypeScript any 类型（应明确声明类型）
        - 不允许空的 catch 块
        - 单个函数不超过 200 行
        - 所有 export 函数必须有 JSDoc 注释
        - 不允许 TODO/FIXME 注释出现在导出的公共函数上
      severity: warning

    - name: "测试覆盖"
      description: |
        所有新增的导出函数必须有对应的 vitest 测试用例，
        测试需覆盖：正常流程、边界值（null/undefined/空字符串）、异常处理。
        如缺少测试，请列出具体需要补充的测试用例。
      severity: warning

    - name: "变更影响"
      description: |
        识别以下高风险变更并在 Walkthrough 中明确标注：
        - Breaking Change（接口/类型签名变更）
        - 影响核心模块（auth、payment、db）的修改
        - N+1 查询或大循环性能问题
        - 新增外部依赖（说明理由和安全评估）
      severity: warning

# ── 对话交互 ───────────────────────────────────────────────
chat:
  auto_reply: true